model:
    cls: DiT_B_4

dataset:
    root: /kaggle/temp/output

training:
    log_per_step: 100
    checkpoint_per_epoch: 10

    num_epochs: 240
    learning_rate: 0.0001
    batch_size: 256
    adam_b2: 0.95
    ema_type: 'const'

    sample_on_training: True
    sample_per_epoch: 10
    fid_per_epoch: 10

    seed: 42

fid:
    device_batch_size: 20
    num_samples: 50000
    cache_ref: /kaggle/temp/output/benjamin-paine_imagenet-1k-128x128_fid_stats.npz

sampling:
    num_steps: 1

wandb:
    project: 'meanflow'
    entity: null  # Set to your wandb username/team
    group: 'imagenet-dit-b4'
    name: 'dit_b4_bs256_lr1e-4'
    run_id: null
    tags: ['dit-b4', 'imagenet', 'meanflow']
    notes: 'DiT-B/4 training on ImageNet latents'
    mode: 'online'  # online, offline, or disabled
    log_model: False

# Load checkpoints for eval or resuming training.
# load_from: CKPT_PATH

load_from: null
eval_only: False
